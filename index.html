<script>
var modules = ["intro","tela","checkin","gondola","checkout","sync","kindle"];
var TOTAL_QUIZ = 6;
var done = new Set();
var quizScores = {};
var quizExplain = {
  tela: "Cada item da lista representa uma pesquisa agendada em um estabelecimento diferente, com data, nome e endere\u00e7o.",
  checkin: "A foto do Check-In deve mostrar claramente a fachada do estabelecimento, evitando fotos escuras ou desfocadas.",
  gondola: "Ao preencher Pre\u00e7o Promo\u00e7\u00e3o, N\u00c3O preencha o campo Regular. Os dois campos s\u00e3o excludentes.",
  checkout: "O processo \u00e9 id\u00eantico (selfie com fachada + GPS + CONCLUIR), mas o Check-In \u00e9 feito ao chegar e o Check-Out ao sair.",
  sync: "A sincroniza\u00e7\u00e3o total exige: acessar o menu (\u2630) \u2192 Re-enviar dados \u2192 Enviar dados e fotos de cada tarefa \u2192 verificar Status.",
  kindle: "As pesquisas com Kindle possuem uma tarefa adicional chamada \"Auditoria Final\", obrigat\u00f3ria ap\u00f3s todas as pesquisas."
};

function saveProgress() {
  try {
    localStorage.setItem('zgo_done', JSON.stringify([...done]));
    localStorage.setItem('zgo_quiz', JSON.stringify(quizScores));
  } catch(e) {}
}

function loadProgress() {
  try {
    var savedDone = localStorage.getItem('zgo_done');
    var savedQuiz = localStorage.getItem('zgo_quiz');
    if (savedDone) {
      JSON.parse(savedDone).forEach(function(id) {
        done.add(id);
        var nav = document.querySelector('[data-module="' + id + '"]');
        if (nav) nav.classList.add('done');
        var btn = document.querySelector('#mod-' + id + ' .btn-done');
        if (btn) { btn.classList.add('completed'); btn.textContent = '\u2714 M\u00f3dulo Conclu\u00eddo'; }
      });
    }
    if (savedQuiz) quizScores = JSON.parse(savedQuiz);
    updateProgress();
    if (done.size > 0) showToast('\ud83d\udcbe Progresso restaurado! ' + done.size + '/' + modules.length + ' m\u00f3dulos conclu\u00eddos.');
  } catch(e) {}
}

function updateProgress() {
  var pct = (done.size / modules.length) * 100;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = done.size + " / " + modules.length + " m\u00f3dulos";
  var sf = document.getElementById("sidebar-progress-fill");
  var st = document.getElementById("sidebar-progress-text");
  if (sf) sf.style.width = pct + "%";
  if (st) st.textContent = done.size + "/" + modules.length;
  updateHeaderScore();
  if (done.size === modules.length) {
    updateFinishScore();
    setTimeout(function() {
      document.getElementById("finish-screen").classList.add("visible");
      document.getElementById("finish-screen").scrollIntoView({ behavior: "smooth", block: "center" });
      launchConfetti();
    }, 500);
  }
}

function updateHeaderScore() {
  var c = Object.values(quizScores).filter(Boolean).length;
  var el = document.getElementById("header-score-text");
  if (el) el.textContent = c + "/" + TOTAL_QUIZ + " quiz";
}

function updateFinishScore() {
  var c = Object.values(quizScores).filter(Boolean).length;
  var el = document.getElementById("finish-score");
  if (el) el.textContent = "\uD83C\uDFC6 " + c + " de " + TOTAL_QUIZ + " quest\u00f5es corretas";
}

// ✅ CORRIGIDO: delay antes de navegar + scroll correto
function markDone(id, btn) {
  done.add(id);
  btn.classList.add("completed");
  btn.textContent = "\u2714 M\u00f3dulo Conclu\u00eddo";
  document.querySelector('[data-module="' + id + '"]').classList.add("done");
  saveProgress();
  updateProgress();
  showToast('\u2705 M\u00f3dulo conclu\u00eddo e salvo!');
  var idx = modules.indexOf(id);
  if (idx < modules.length - 1) {
    var next = modules[idx + 1];
    setTimeout(function() {
      showModule(next, document.querySelector('[data-module="' + next + '"]'));
    }, 350);
  }
}

// ✅ CORRIGIDO: scroll para o topo antes de mostrar o próximo módulo
function showModule(id, el) {
  modules.forEach(function(m) {
    document.getElementById("mod-" + m).classList.remove("visible");
  });
  document.querySelectorAll(".nav-item").forEach(function(n) {
    n.classList.remove("active");
  });

  // Rola para o topo primeiro para garantir que o módulo apareça visível
  window.scrollTo({ top: 0, behavior: 'smooth' });

  setTimeout(function() {
    document.getElementById("mod-" + id).classList.add("visible");
    if (el) el.classList.add("active");

    var card = document.getElementById("mod-" + id);
    var header = card.querySelector(".card-header");
    var body = card.querySelector(".card-body");
    header.classList.add("open");
    body.classList.add("open");
    header.querySelector(".card-chevron").textContent = "\u25B2";
    header.setAttribute("aria-expanded", "true");

    // Scroll com offset do header fixo (56px)
    requestAnimationFrame(function() {
      var headerOffset = 72;
      var top = card.getBoundingClientRect().top + window.pageYOffset - headerOffset;
      window.scrollTo({ top: top, behavior: 'smooth' });
    });
  }, 150);

  closeMobileMenu();
}

function toggleCard(header) {
  var body = header.nextElementSibling;
  var chevron = header.querySelector(".card-chevron");
  var isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  header.classList.toggle("open", !isOpen);
  chevron.textContent = isOpen ? "\u25BC" : "\u25B2";
  header.setAttribute("aria-expanded", String(!isOpen));
}

function answerQuiz(btn, idx, correct, moduleId) {
  var section = btn.closest(".quiz-section");
  var options = section.querySelectorAll(".quiz-option");
  var feedback = document.getElementById("qfb-" + moduleId);
  var retry = document.getElementById("qr-" + moduleId);
  options.forEach(function(opt) {
    opt.classList.add("disabled");
    opt.setAttribute("aria-disabled", "true");
  });
  if (idx === correct) {
    btn.classList.add("correct");
    feedback.className = "quiz-feedback show success";
    feedback.innerHTML = "\u2705 Correto! " + quizExplain[moduleId];
    quizScores[moduleId] = true;
  } else {
    btn.classList.add("wrong");
    options[correct].classList.add("correct");
    feedback.className = "quiz-feedback show error";
    feedback.innerHTML = "\u274C N\u00e3o foi dessa vez. " + quizExplain[moduleId];
    quizScores[moduleId] = false;
    retry.classList.add("show");
  }
  saveProgress();
  updateHeaderScore();
}

function retryQuiz(moduleId) {
  var section = document.getElementById("qfb-" + moduleId).closest(".quiz-section");
  section.querySelectorAll(".quiz-option").forEach(function(o) {
    o.classList.remove("correct", "wrong", "disabled");
    o.removeAttribute("aria-disabled");
  });
  document.getElementById("qfb-" + moduleId).className = "quiz-feedback";
  document.getElementById("qr-" + moduleId).classList.remove("show");
  delete quizScores[moduleId];
  saveProgress();
  updateHeaderScore();
}

function toggleMobileMenu() {
  document.getElementById("sidebar").classList.toggle("mobile-open");
  document.getElementById("mobileOverlay").classList.toggle("active");
}

function closeMobileMenu() {
  document.getElementById("sidebar").classList.remove("mobile-open");
  document.getElementById("mobileOverlay").classList.remove("active");
}

function showToast(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 3000);
}

function launchConfetti() {
  var canvas = document.getElementById("confetti-canvas");
  canvas.style.display = "block";
  var ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var particles = [];
  var colors = ["#E8312A","#2DA44E","#F59E0B","#3B82F6","#8B5CF6","#EC4899","#fff"];
  for (var i = 0; i < 160; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 6 + 4,
      d: Math.random() * 150 + 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt: Math.floor(Math.random() * 10) - 10,
      tiltAngleInc: Math.random() * 0.07 + 0.05,
      tiltAngle: 0
    });
  }
  var angle = 0; var frame = 0; var maxFrames = 320;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      ctx.beginPath(); ctx.lineWidth = p.r / 2; ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 4, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 4);
      ctx.stroke();
    });
    angle += 0.01; frame++;
    particles.forEach(function(p, i) {
      p.tiltAngle += p.tiltAngleInc;
      p.y += (Math.cos(angle + p.d) + 1 + p.r / 2) * 1.5;
      p.x += Math.sin(angle) * 1.5;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      if (p.y > canvas.height && frame < maxFrames) {
        particles[i] = { x: Math.random() * canvas.width, y: -10, r: p.r, d: p.d, color: p.color, tilt: p.tilt, tiltAngleInc: p.tiltAngleInc, tiltAngle: p.tiltAngle };
      }
    });
  }
  var interval = setInterval(draw, 16);
  setTimeout(function() {
    clearInterval(interval);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";
  }, maxFrames * 16 + 500);
}

window.addEventListener('DOMContentLoaded', loadProgress);
</script>
